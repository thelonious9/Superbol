<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro general de información</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    :root {
      --color-fondo-pagina: #fcfcfc;
      --color-fondo-form: #ffffff;
      --color-primary: #15173D;
      --color-danger: #d90000;
      --color-text: #15173D;
      --color-border: #15173D;
      --radius: 0px;
      --table-zoom: 1;
      --color-blocked-bg: #eaecf0;
    }

    body.dark-mode {
      --color-fondo-pagina: #1a1a1a;
      --color-fondo-form: #242424;
      --color-text: #e0e0e0;
      --color-border: #444;
      --color-blocked-bg: #2d2d2d;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      margin: 0 auto;
      max-width: 1440px;
      padding: 40px;
      background: var(--color-fondo-pagina);
      color: var(--color-text);
      letter-spacing: -0.3px;
      transition: background-color 0.3s, color 0.3s;
    }

    header {
      border-top: 5px solid var(--color-text);
      border-bottom: 5px solid var(--color-text);
      padding: 24px 0;
      margin-bottom: 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      font-size: 3.5rem;
      font-weight: 800;
      margin: 0;
      letter-spacing: -1.5px;
    }

    header h1::after {
      content: '®';
      font-size: 1.5rem;
      vertical-align: super;
      font-weight: 400;
    }

    .header-content p {
      margin: 5px 0 0;
      font-size: 1.1rem;
      font-weight: 700;
    }

    .header-actions {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .nav-btn,
    .theme-toggle-btn {
      background: transparent;
      border: 2px solid var(--color-border);
      color: var(--color-text);
      width: 45px;
      height: 45px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      text-decoration: none;
      transition: all 0.2s;
    }

    .nav-btn:hover,
    .theme-toggle-btn:hover {
      background: var(--color-text);
      color: var(--color-fondo-pagina);
    }

    .art-box {
      background: var(--color-text);
      width: 100%;
      height: 120px;
      margin-bottom: 32px;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow: hidden;
    }

    .art-circle {
      width: 150px;
      height: 150px;
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 50%;
      position: absolute;
      top: -15px;
    }

    .art-circle:nth-child(1) {
      left: calc(50% - 225px);
    }

    .art-circle:nth-child(2) {
      left: calc(50% - 75px);
    }

    .art-circle:nth-child(3) {
      left: calc(50% + 75px);
    }

    form {
      display: grid;
      grid-template-columns: auto 1fr auto 1fr;
      gap: 16px 20px;
    }

    label {
      font-weight: 700;
      align-self: center;
      font-size: 1.1rem;
      color: var(--color-text);
    }

    .campo {
      display: flex;
      align-items: center;
      gap: 8px;
      position: relative;
    }

    .campo-full {
      grid-column: 2 / span 3;
    }

    .campo input[type="text"],
    .campo input[type="date"],
    .campo textarea,
    .campo select {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid var(--color-border);
      background: var(--color-fondo-form);
      color: var(--color-text);
      font-family: inherit;
      font-size: 1rem;
      outline: none;
      border-radius: 0;
    }

    .campo input:focus,
    .campo textarea:focus,
    .campo select:focus {
      background-color: var(--color-text);
      color: var(--color-fondo-pagina);
    }

    .campo textarea {
      min-height: 45px;
      height: auto;
      overflow-y: hidden;
      resize: none;
    }

    .campo-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .btn-campo {
      padding: 10px 14px;
      border: 2px solid var(--color-border);
      background: transparent;
      color: var(--color-text);
      cursor: pointer;
      font-weight: bold;
      font-size: 1rem;
    }

    .btn-campo:hover {
      background: var(--color-text);
      color: var(--color-fondo-pagina);
    }

    .campo input[type="checkbox"] {
      display: none;
    }

    .lock-label {
      cursor: pointer;
      color: var(--color-text);
      font-size: 1.1rem;
      opacity: 0.3;
      transition: all 0.2s;
    }

    .campo input[type="checkbox"]:checked+.lock-label {
      opacity: 1;
    }

    .bloqueado {
      background: var(--color-blocked-bg) !important;
      pointer-events: none;
    }

    .sugerencias {
      position: absolute;
      top: 100%;
      left: 0;
      width: 100%;
      border: 2px solid var(--color-border);
      background: var(--color-fondo-form);
      color: var(--color-text);
      max-height: 220px;
      overflow-y: auto;
      z-index: 1000;
      display: none;
    }

    .sugerencia {
      padding: 10px 14px;
      cursor: pointer;
      border-bottom: 1px solid rgba(0, 0, 0, 0.05);
    }

    .sugerencia:hover,
    .sugerencia.resaltado {
      background: var(--color-text);
      color: var(--color-fondo-pagina);
    }

    .form-section-title {
      grid-column: 1 / span 4;
      font-size: 1.25rem;
      font-weight: 800;
      border-bottom: 2px solid var(--color-text);
      padding-bottom: 8px;
      margin-top: 20px;
      text-transform: uppercase;
    }

    .button-group-form {
      grid-column: 1 / span 4;
      display: flex;
      gap: 14px;
      margin-top: 16px;
      border-top: 2px solid var(--color-border);
      padding-top: 20px;
      flex-wrap: wrap;
    }

    button:not(.btn-campo) {
      padding: 12px 18px;
      border: 2px solid var(--color-border);
      font-weight: 700;
      color: var(--color-text);
      background: transparent;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 1rem;
    }

    button:not(.btn-campo):hover {
      background: var(--color-text);
      color: var(--color-fondo-pagina);
    }

    #btnBorrarTodo,
    #btnEliminar {
      border-color: var(--color-danger);
      color: var(--color-danger);
    }

    #btnBorrarTodo:hover,
    #btnEliminar:hover {
      background: var(--color-danger);
      color: #fff;
    }

    .table-header-container {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-top: 40px;
      margin-bottom: 15px;
      border-bottom: 2px solid var(--color-text);
      padding-bottom: 10px;
    }

    .table-header-container h2 {
      font-size: 2rem;
      margin: 0;
      font-weight: 700;
    }

    .zoom-controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-zoom {
      padding: 6px 10px;
      border: 2px solid var(--color-border);
      background: transparent;
      color: var(--color-text);
      cursor: pointer;
      font-weight: bold;
    }

    .btn-zoom:hover {
      background: var(--color-text);
      color: var(--color-fondo-pagina);
    }

    .zoom-display {
      font-weight: bold;
      min-width: 50px;
      text-align: center;
      font-size: 0.9rem;
      cursor: pointer;
    }

    #buscador {
      padding: 6px 10px;
      border: 2px solid var(--color-border);
      background: var(--color-fondo-form);
      color: var(--color-text);
      font-size: 1rem;
    }

    .table-container {
      width: 100%;
      overflow-x: auto;
      border: 2px solid var(--color-border);
      background: var(--color-fondo-form);
      margin-top: 15px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: calc(0.9rem * var(--table-zoom));
    }

    th {
      background: var(--color-fondo-form);
      color: var(--color-text);
      padding: 12px 10px;
      font-weight: 800;
      border: 1px solid var(--color-border);
      text-align: left;
      white-space: nowrap;
      text-transform: uppercase;
      cursor: pointer;
      user-select: none;
    }

    td {
      padding: 12px 10px;
      border: 1px solid var(--color-border);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 200px;
    }

    tr:hover td {
      background: var(--color-text);
      color: var(--color-fondo-pagina);
    }

    tr.editando td {
      background: #fffde7 !important;
      color: #555 !important;
    }

    tr.alerta-vacio {
      border-left: 4px solid #f6ad55;
    }

    .acciones-btn-group {
      display: flex;
      gap: 5px;
      justify-content: center;
    }

    .btn-icon-accion {
      background: transparent;
      border: 1.5px solid var(--color-border);
      color: var(--color-text);
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.85rem;
    }

    .btn-icon-accion:hover {
      background: var(--color-text);
      color: var(--color-fondo-pagina);
    }

    .btn-icon-accion.borrar:hover {
      background: var(--color-danger);
      border-color: var(--color-danger);
      color: #fff;
    }

    @media (max-width: 1024px) {
      form {
        grid-template-columns: auto 1fr;
      }

      .campo-full {
        grid-column: 2;
      }

      .button-group-form,
      .form-section-title {
        grid-column: 1 / span 2;
      }
    }
  </style>
</head>

<body>
  <header>
    <div class="header-content">
      <h1>Registro general de información</h1>
      <p id="recordCount">0 registros capturados</p>
    </div>
    <div class="header-actions">
      <a href="dashboard.html" class="nav-btn" title="Ver Dashboard"><i class="fas fa-chart-line"></i></a>
      <button class="theme-toggle-btn" onclick="toggleDarkMode()" title="Cambiar tema"><i class="fas fa-moon"
          id="themeIcon"></i></button>
    </div>
  </header>

  <div class="art-box">
    <div class="art-circle"></div>
    <div class="art-circle"></div>
    <div class="art-circle"></div>
  </div>

  <form id="notaForm">

    <!-- Usuario -->
    <label for="usuario">Usuario:</label>
    <div class="campo">
      <input type="text" id="usuario" autocomplete="off" required>
      <div class="campo-actions">
        <button type="button" class="btn-campo" onclick="mostrarTodo('usuario')" tabindex="-1">🔽</button>
        <input type="checkbox" id="checkUsuario" onchange="alternarBloqueo('usuario')" tabindex="-1">
        <label for="checkUsuario" class="lock-label"><i class="fa-solid fa-lock"></i></label>
      </div>
      <div id="sugUsuario" class="sugerencias"></div>
    </div>

    <!-- Género + ID -->
    <label for="genero">Género:</label>
    <div class="campo">
      <input type="text" id="genero" autocomplete="off" required>
      <div class="campo-actions">
        <button type="button" class="btn-campo" onclick="mostrarTodo('genero')" tabindex="-1">🔽</button>
        <input type="checkbox" id="checkGenero" onchange="alternarBloqueo('genero')" tabindex="-1">
        <label for="checkGenero" class="lock-label"><i class="fa-solid fa-lock"></i></label>
      </div>
      <div id="sugGenero" class="sugerencias"></div>
    </div>

    <label for="id_consecutivo">ID:</label>
    <div class="campo">
      <input type="text" id="id_consecutivo" placeholder="Alfanumérico (ej. A123)">
      <div class="campo-actions">
        <input type="checkbox" id="checkId" onchange="alternarBloqueo('id_consecutivo')" tabindex="-1">
        <label for="checkId" class="lock-label"><i class="fa-solid fa-lock"></i></label>
      </div>
    </div>

    <!-- Fecha + Tipo -->
    <label for="fecha">Fecha:</label>
    <div class="campo">
      <input type="date" id="fecha" required>
      <div class="campo-actions">
        <input type="checkbox" id="checkFecha" onchange="alternarBloqueo('fecha')" tabindex="-1">
        <label for="checkFecha" class="lock-label"><i class="fa-solid fa-lock"></i></label>
      </div>
    </div>

    <label for="tipo">Tipo:</label>
    <div class="campo">
      <input type="text" id="tipo" autocomplete="off" required>
      <div class="campo-actions">
        <button type="button" class="btn-campo" onclick="mostrarTodo('tipo')" tabindex="-1">🔽</button>
        <input type="checkbox" id="checkTipo" onchange="alternarBloqueo('tipo')" tabindex="-1">
        <label for="checkTipo" class="lock-label"><i class="fa-solid fa-lock"></i></label>
      </div>
      <div id="sugTipo" class="sugerencias"></div>
    </div>

    <!-- Titular -->
    <label for="titular">Titular:</label>
    <div class="campo campo-full">
      <textarea id="titular" required oninput="ajustarAlturaCampo('titular')"></textarea>
      <div class="campo-actions">
        <input type="checkbox" id="checkTitular" onchange="alternarBloqueo('titular')" tabindex="-1">
        <label for="checkTitular" class="lock-label"><i class="fa-solid fa-lock"></i></label>
      </div>
    </div>

    <!-- Dependencia + Organismo (dependiente) -->
    <label for="dependencia">Dependencia:</label>
    <div class="campo">
      <input type="text" id="dependencia" autocomplete="off" required>
      <div class="campo-actions">
        <button type="button" class="btn-campo" onclick="mostrarTodo('dependencia')" tabindex="-1">🔽</button>
        <input type="checkbox" id="checkDependencia" onchange="alternarBloqueo('dependencia')" tabindex="-1">
        <label for="checkDependencia" class="lock-label"><i class="fa-solid fa-lock"></i></label>
      </div>
      <div id="sugDependencia" class="sugerencias"></div>
    </div>

    <label for="organismo">Organismo:</label>
    <div class="campo">
      <input type="text" id="organismo" autocomplete="off" placeholder="Selecciona Dependencia primero">
      <div class="campo-actions">
        <button type="button" class="btn-campo" onclick="mostrarTodo('organismo')" tabindex="-1">🔽</button>
        <input type="checkbox" id="checkOrganismo" onchange="alternarBloqueo('organismo')" tabindex="-1">
        <label for="checkOrganismo" class="lock-label"><i class="fa-solid fa-lock"></i></label>
      </div>
      <div id="sugOrganismo" class="sugerencias"></div>
    </div>

    <!-- Municipio + Localidad (dependiente) -->
    <label for="municipio">Municipio / Región:</label>
    <div class="campo">
      <input type="text" id="municipio" autocomplete="off" required>
      <div class="campo-actions">
        <button type="button" class="btn-campo" onclick="mostrarTodo('municipio')" tabindex="-1">🔽</button>
        <input type="checkbox" id="checkMunicipio" onchange="alternarBloqueo('municipio')" tabindex="-1">
        <label for="checkMunicipio" class="lock-label"><i class="fa-solid fa-lock"></i></label>
      </div>
      <div id="sugMunicipio" class="sugerencias"></div>
    </div>

    <label for="localidad">Localidad:</label>
    <div class="campo">
      <input type="text" id="localidad" autocomplete="off" placeholder="Selecciona Municipio primero">
      <div class="campo-actions">
        <button type="button" class="btn-campo" onclick="mostrarTodo('localidad')" tabindex="-1">🔽</button>
        <input type="checkbox" id="checkLocalidad" onchange="alternarBloqueo('localidad')" tabindex="-1">
        <label for="checkLocalidad" class="lock-label"><i class="fa-solid fa-lock"></i></label>
      </div>
      <div id="sugLocalidad" class="sugerencias"></div>
    </div>

    <!-- Emite + Tema -->
    <label for="emite">Emite:</label>
    <div class="campo">
      <input type="text" id="emite" autocomplete="off" required>
      <div class="campo-actions">
        <button type="button" class="btn-campo" onclick="mostrarTodo('emite')" tabindex="-1">🔽</button>
        <input type="checkbox" id="checkEmite" onchange="alternarBloqueo('emite')" tabindex="-1">
        <label for="checkEmite" class="lock-label"><i class="fa-solid fa-lock"></i></label>
      </div>
      <div id="sugEmite" class="sugerencias"></div>
    </div>

    <label for="tema">Tema:</label>
    <div class="campo">
      <input type="text" id="tema" autocomplete="off">
      <div class="campo-actions">
        <button type="button" class="btn-campo" onclick="mostrarTodo('tema')" tabindex="-1">🔽</button>
        <input type="checkbox" id="checkTema" onchange="alternarBloqueo('tema')" tabindex="-1">
        <label for="checkTema" class="lock-label"><i class="fa-solid fa-lock"></i></label>
      </div>
      <div id="sugTema" class="sugerencias"></div>
    </div>



    <!-- Enlace -->
    <label for="enlace">Enlace:</label>
    <div class="campo campo-full">
      <input type="text" id="enlace">
    </div>

    <!-- Revisión editorial → ahora aquí, después de Enlace -->
    <label for="revision">Revisión:</label>
    <div class="campo">
      <input type="text" id="revision" autocomplete="off">
      <div class="campo-actions">
        <button type="button" class="btn-campo" onclick="mostrarTodo('revision')" tabindex="-1">🔽</button>
        <input type="checkbox" id="checkRevision" onchange="alternarBloqueo('revision')" tabindex="-1">
        <label for="checkRevision" class="lock-label"><i class="fa-solid fa-lock"></i></label>
      </div>
      <div id="sugRevision" class="sugerencias"></div>
    </div>

    <!-- Espacio vacío para mantener la rejilla -->
    <div></div>
    <div></div>

    <!-- Binarios: Foto/imágenes, Video, Audio -->
    <label for="foto_imagenes">Foto/imágenes:</label>
    <div class="campo">
      <select id="foto_imagenes">
        <option value="">— Seleccionar —</option>
        <option value="Sí">Sí</option>
        <option value="No">No</option>
      </select>
      <div class="campo-actions">
        <input type="checkbox" id="checkFoto_imagenes" onchange="alternarBloqueo('foto_imagenes')" tabindex="-1">
        <label for="checkFoto_imagenes" class="lock-label"><i class="fa-solid fa-lock"></i></label>
      </div>
    </div>

    <label for="video">Video:</label>
    <div class="campo">
      <select id="video">
        <option value="">— Seleccionar —</option>
        <option value="Sí">Sí</option>
        <option value="No">No</option>
      </select>
      <div class="campo-actions">
        <input type="checkbox" id="checkVideo" onchange="alternarBloqueo('video')" tabindex="-1">
        <label for="checkVideo" class="lock-label"><i class="fa-solid fa-lock"></i></label>
      </div>
    </div>

    <label for="audio">Audio:</label>
    <div class="campo">
      <select id="audio">
        <option value="">— Seleccionar —</option>
        <option value="Sí">Sí</option>
        <option value="No">No</option>
      </select>
      <div class="campo-actions">
        <input type="checkbox" id="checkAudio" onchange="alternarBloqueo('audio')" tabindex="-1">
        <label for="checkAudio" class="lock-label"><i class="fa-solid fa-lock"></i></label>
      </div>
    </div>

    <!-- Espacio vacío -->
    <div></div>
    <div></div>

    <!-- Cobertura -->
    <div class="form-section-title" style="display:flex;align-items:center;justify-content:space-between;">
      <span>Cobertura</span>
      <button type="button" id="btnNoAplica" onclick="noAplica()"
        style="margin-top:0;font-size:0.9rem;padding:6px 14px;"><i class="fa-solid fa-ban"></i> No aplica</button>
    </div>

    <label for="reporta">Reporta:</label>
    <div class="campo">
      <input type="text" id="reporta" autocomplete="off">
      <div class="campo-actions">
        <button type="button" class="btn-campo" onclick="mostrarTodo('reporta')" tabindex="-1">🔽</button>
        <input type="checkbox" id="checkReporta" onchange="alternarBloqueo('reporta')" tabindex="-1">
        <label for="checkReporta" class="lock-label"><i class="fa-solid fa-lock"></i></label>
      </div>
      <div id="sugReporta" class="sugerencias"></div>
    </div>

    <label for="fotografia">Fotografía:</label>
    <div class="campo">
      <input type="text" id="fotografia" autocomplete="off">
      <div class="campo-actions">
        <button type="button" class="btn-campo" onclick="mostrarTodo('fotografia')" tabindex="-1">🔽</button>
        <input type="checkbox" id="checkFotografia" onchange="alternarBloqueo('fotografia')" tabindex="-1">
        <label for="checkFotografia" class="lock-label"><i class="fa-solid fa-lock"></i></label>
      </div>
      <div id="sugFotografia" class="sugerencias"></div>
    </div>

    <label for="audiovisual">Audiovisual:</label>
    <div class="campo">
      <input type="text" id="audiovisual" autocomplete="off">
      <div class="campo-actions">
        <button type="button" class="btn-campo" onclick="mostrarTodo('audiovisual')" tabindex="-1">🔽</button>
        <input type="checkbox" id="checkAudiovisual" onchange="alternarBloqueo('audiovisual')" tabindex="-1">
        <label for="checkAudiovisual" class="lock-label"><i class="fa-solid fa-lock"></i></label>
      </div>
      <div id="sugAudiovisual" class="sugerencias"></div>
    </div>

    <label for="redes">Redes:</label>
    <div class="campo">
      <input type="text" id="redes" autocomplete="off">
      <div class="campo-actions">
        <button type="button" class="btn-campo" onclick="mostrarTodo('redes')" tabindex="-1">🔽</button>
        <input type="checkbox" id="checkRedes" onchange="alternarBloqueo('redes')" tabindex="-1">
        <label for="checkRedes" class="lock-label"><i class="fa-solid fa-lock"></i></label>
      </div>
      <div id="sugRedes" class="sugerencias"></div>
    </div>

    <label for="logistica">Logística:</label>
    <div class="campo">
      <input type="text" id="logistica" autocomplete="off">
      <div class="campo-actions">
        <button type="button" class="btn-campo" onclick="mostrarTodo('logistica')" tabindex="-1">🔽</button>
        <input type="checkbox" id="checkLogistica" onchange="alternarBloqueo('logistica')" tabindex="-1">
        <label for="checkLogistica" class="lock-label"><i class="fa-solid fa-lock"></i></label>
      </div>
      <div id="sugLogistica" class="sugerencias"></div>
    </div>

    <!-- Espacio -->
    <div></div>
    <div></div>

    <div class="button-group-form">
      <button type="submit" id="btnGuardar"><i class="fa-solid fa-floppy-disk"></i> Guardar (Ctrl+Q)</button>
      <button type="button" onclick="limpiarFormulario()"><i class="fa-solid fa-broom"></i> Limpiar</button>
      <button type="button" id="btnExportar" onclick="exportarNotas()"><i class="fa-solid fa-file-export"></i> Exportar
        captura</button>
      <button type="button" id="btnEliminar" style="display:none" onclick="borrarNota()"><i
          class="fa-solid fa-trash-can"></i> Eliminar</button>
      <button type="button" id="btnBorrarTodo" onclick="borrarTodo()"><i class="fa-solid fa-triangle-exclamation"></i>
        Borrar Todo</button>
    </div>
  </form>

  <div class="table-header-container">
    <h2>Detalle de Captura</h2>
    <div class="zoom-controls">
      <button class="btn-zoom" onclick="ajustarZoom(-0.1)">−</button>
      <span class="zoom-display" id="zoomVal" onclick="ajustarZoom(0,true)">100%</span>
      <button class="btn-zoom" onclick="ajustarZoom(0.1)">+</button>
      <input type="text" id="buscador" placeholder="Filtrar notas..." style="margin-left:15px;">
    </div>
  </div>

  <div class="table-container">
    <table id="tablaNotas">
      <thead>
        <tr>
          <th onclick="ordenar('usuario')">Usuario</th>
          <th onclick="ordenar('genero')">Género</th>
          <th onclick="ordenar('id_consecutivo')">ID</th>
          <th onclick="ordenar('fecha')">Fecha</th>
          <th onclick="ordenar('titular')">Titular</th>
          <th onclick="ordenar('dependencia')">Dependencia</th>
          <th onclick="ordenar('organismo')">Organismo</th>
          <th onclick="ordenar('municipio')">Municipio / Región</th>
          <th onclick="ordenar('localidad')">Localidad</th>
          <th onclick="ordenar('tipo')">Tipo</th>
          <th onclick="ordenar('emite')">Emite</th>
          <th onclick="ordenar('tema')">Tema</th>

          <th onclick="ordenar('enlace')">Enlace</th>
          <th onclick="ordenar('revision')">Revisión</th>
          <th onclick="ordenar('foto_imagenes')">Fotos</th>
          <th onclick="ordenar('video')">Video</th>
          <th onclick="ordenar('audio')">Audio</th>
          <th onclick="ordenar('reporta')">Reporta</th>
          <th onclick="ordenar('fotografia')">Fotografía</th>
          <th onclick="ordenar('audiovisual')">Audiovisual</th>
          <th onclick="ordenar('redes')">Redes</th>
          <th onclick="ordenar('logistica')">Logística</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <script>
    // ─── CONFIGURACIÓN ────────────────────────────────────────────────────────
    const CAMPOS = ['usuario', 'genero', 'id_consecutivo', 'fecha', 'titular', 'dependencia', 'organismo',
      'municipio', 'localidad', 'tipo', 'emite', 'tema', 'enlace', 'revision',
      'foto_imagenes', 'video', 'audio', 'reporta', 'fotografia', 'audiovisual', 'redes', 'logistica'];

    const CAMPOS_OBLIGATORIOS = ['usuario', 'genero', 'fecha', 'titular', 'dependencia', 'municipio', 'tipo', 'emite'];

    // Campos que son <select> (no manejan autocomplete de texto)
    const CAMPOS_SELECT = ['foto_imagenes', 'video', 'audio'];

    function getCheckId(id) {
      const excepciones = { 'id_consecutivo': 'checkId', 'foto_imagenes': 'checkFoto_imagenes' };
      return excepciones[id] || `check${id.charAt(0).toUpperCase() + id.slice(1)}`;
    }

    function getSugId(id) {
      return `sug${id.charAt(0).toUpperCase() + id.slice(1)}`;
    }

    const GAS_URL = "https://script.google.com/macros/s/AKfycbw7mr_aL1DADiJ8Iy_RgOXBzFgHrcQKBCkRETtpGO6iBWsqmGzcvy3eFbKmrXrHNXiITw/exec";

    const URLS_CSV = {
      usuario: './Usuario.csv',
      genero: './Género.csv',
      // organismo.csv tiene col1=Dependencia, col2=Organismo → se usa para AMBOS (dep y org)
      organismo: './Organismo.csv',
      municipio: './Municipio.csv',
      localidad: './Localidad.csv',   // col1=Municipio, col2=Localidad
      tipo: './Tipo.csv',
      emite: './Emisión.csv',
      tema: './Tema.csv',
      reporta: './Reportere.csv',
      fotografia: './Foto.csv',
      audiovisual: './Video.csv',
      redes: './Redes.csv',
      logistica: './Logistica.csv',
      revision: './Revision.csv'
    };

    // Estado global
    let notas = JSON.parse(localStorage.getItem('superbol_notas') || '[]');
    let depOrgMap = {};   // { "Bienestar": ["IAAMEH","Inhjuve",...], ... }
    let munLocMap = {};   // { "Actopan": ["Actopan","Benito Juárez",...], ... }
    let filaEnEdicion = null;
    let zoomLevel = 1.0;
    let ordenActual = { col: 'fecha', dir: 'desc' };

    // ─── UTILS CSV ────────────────────────────────────────────────────────────
    async function cargarCSV(url) {
      try {
        const res = await fetch(`${url}?t=${Date.now()}`);
        const buf = await res.arrayBuffer();
        const txt = new TextDecoder('utf-8').decode(buf);
        // Divide en líneas y cada línea en celdas por coma
        return txt.split('\n').map(l => l.split(',').map(c => c.trim().replace(/\r$/, '')));
      } catch { return []; }
    }

    function limpiarFilas(filas) {
      if (!filas.length) return [];
      // Eliminar BOM
      if (filas[0] && filas[0][0]) filas[0][0] = filas[0][0].replace(/^\uFEFF/, '');
      // Detectar encabezado por keywords
      const cab = filas[0].map(c => c.toLowerCase()).join(',');
      const tieneEncabezado = /dependencia|municipio|localidad|organismo|género|genero|usuario/.test(cab);
      return (tieneEncabezado ? filas.slice(1) : filas).filter(r => r[0]);
    }

    // Construye { clave → [valores] } de un CSV de dos columnas
    async function cargarMapa(url) {
      const rows = limpiarFilas(await cargarCSV(url));
      const mapa = {};
      rows.forEach(([k, v]) => {
        if (!k) return;
        if (!mapa[k]) mapa[k] = [];
        if (v && !mapa[k].includes(v)) mapa[k].push(v);
      });
      // Ordenar valores
      Object.keys(mapa).forEach(k => mapa[k].sort((a, b) => a.localeCompare(b, 'es')));
      return mapa;
    }

    // Extrae lista simple (primera columna) de un CSV
    async function cargarLista(url) {
      const rows = limpiarFilas(await cargarCSV(url));
      const set = new Set(rows.map(r => r[0]).filter(Boolean));
      return Array.from(set).sort((a, b) => a.localeCompare(b, 'es'));
    }

    // ─── SUGERENCIAS ─────────────────────────────────────────────────────────
    function cerrarSugerencias() {
      document.querySelectorAll('.sugerencias').forEach(el => {
        el.innerHTML = ''; el.style.display = 'none';
      });
    }

    function mostrarListaEn(idCampo, items, alSeleccionar) {
      const input = document.getElementById(idCampo);
      const cont = document.getElementById(getSugId(idCampo));
      if (!cont) return;

      cerrarSugerencias();
      if (!items.length) return;

      cont.style.display = 'block';
      items.forEach(s => {
        const d = document.createElement('div');
        d.className = 'sugerencia';
        d.textContent = s;
        d.onmousedown = ev => {
          ev.preventDefault();
          input.value = s;
          cerrarSugerencias();
          if (alSeleccionar) alSeleccionar(s);
          moverFoco(input);
        };
        cont.appendChild(d);
      });
    }

    // Botón 🔽: muestra todos sin filtrar
    function mostrarTodo(idCampo) {
      const input = document.getElementById(idCampo);
      const cont = document.getElementById(getSugId(idCampo));
      if (!cont) return;

      // Toggle
      if (cont.style.display === 'block') { cerrarSugerencias(); return; }

      const lista = JSON.parse(input.dataset.lista || '[]');
      // Callback adecuado según campo
      const cb = idCampo === 'dependencia' ? actualizarOrganismo
        : idCampo === 'municipio' ? actualizarLocalidad
          : null;
      mostrarListaEn(idCampo, lista, cb);
    }

    // Registra lista en dataset y adjunta listeners de escritura predictiva
    function registrarAutocompletado(idCampo, lista, alSeleccionar) {
      const input = document.getElementById(idCampo);
      const cont = document.getElementById(getSugId(idCampo));
      if (!input || !cont) return;

      input.dataset.lista = JSON.stringify(lista);
      let indice = -1;

      // Escritura predictiva
      input.addEventListener('input', () => {
        const val = input.value.toLowerCase().trim();
        indice = -1;
        if (!val) { cerrarSugerencias(); return; }
        const listaActual = JSON.parse(input.dataset.lista || '[]');
        const filtrados = listaActual.filter(i => i.toLowerCase().includes(val));
        mostrarListaEn(idCampo, filtrados, alSeleccionar);
      });

      // Navegación con teclado
      input.addEventListener('keydown', e => {
        const items = cont.querySelectorAll('.sugerencia');
        const N = items.length;

        // Enter/Tab con única sugerencia
        if (N === 1 && (e.key === 'Enter' || e.key === 'Tab')) {
          e.preventDefault();
          const val = items[0].textContent;
          input.value = val;
          cerrarSugerencias();
          if (alSeleccionar) alSeleccionar(val);
          moverFoco(input);
          return;
        }
        if (N === 0 && e.key === 'Enter') { e.preventDefault(); moverFoco(input); return; }

        if (e.key === 'ArrowDown') {
          e.preventDefault(); indice = (indice + 1) % N; resaltar(items, indice);
        } else if (e.key === 'ArrowUp') {
          e.preventDefault(); indice = (indice - 1 + N) % N; resaltar(items, indice);
        } else if (e.key === 'Enter' && indice >= 0) {
          e.preventDefault();
          const val = items[indice].textContent;
          input.value = val;
          cerrarSugerencias();
          if (alSeleccionar) alSeleccionar(val);
          moverFoco(input);
          indice = -1;
        }
      });

      input.addEventListener('blur', () => setTimeout(cerrarSugerencias, 200));

      function resaltar(its, i) {
        its.forEach(el => el.classList.remove('resaltado'));
        its[i].classList.add('resaltado');
        its[i].scrollIntoView({ block: 'nearest' });
      }
    }

    // ─── DEPENDENCIAS ─────────────────────────────────────────────────────────
    function actualizarOrganismo(dep) {
      const lista = depOrgMap[dep] || [];
      const orgInput = document.getElementById('organismo');
      orgInput.dataset.lista = JSON.stringify(lista);
      orgInput.placeholder = lista.length ? 'Seleccionar Organismo' : 'Sin organismos para esta dependencia';
    }

    function actualizarLocalidad(mun) {
      const lista = munLocMap[mun] || [];
      const locInput = document.getElementById('localidad');
      locInput.dataset.lista = JSON.stringify(lista);
      locInput.placeholder = lista.length ? 'Seleccionar Localidad' : 'Sin localidades para este municipio';
    }

    // ─── FOCO ─────────────────────────────────────────────────────────────────
    function moverFoco(actual) {
      const todos = Array.from(document.querySelectorAll(
        'input:not([type="checkbox"]):not([tabindex="-1"]), textarea, select'));
      const activos = todos.filter(el => !el.readOnly && !el.disabled);
      const idx = activos.indexOf(actual);
      if (idx > -1 && idx < activos.length - 1) activos[idx + 1].focus();
    }

    // ─── INIT ─────────────────────────────────────────────────────────────────
    async function init() {
      // 1. Listas simples
      const simplesConf = [
        ['usuario', './Usuario.csv', null],
        ['genero', URLS_CSV.genero, null],
        ['tipo', URLS_CSV.tipo, null],
        ['emite', URLS_CSV.emite, null],
        ['tema', URLS_CSV.tema, null],
        ['reporta', URLS_CSV.reporta, null],
        ['fotografia', URLS_CSV.fotografia, null],
        ['audiovisual', URLS_CSV.audiovisual, null],
        ['redes', URLS_CSV.redes, null],
        ['logistica', URLS_CSV.logistica, null],
        ['revision', URLS_CSV.revision, null],
      ];
      for (const [id, url] of simplesConf) {
        const lista = await cargarLista(url);
        registrarAutocompletado(id, lista, null);
      }

      // 2. Dependencia → Organismo
      //    Organismo.csv = col1:Dependencia, col2:Organismo
      depOrgMap = await cargarMapa(URLS_CSV.organismo);
      const depList = Object.keys(depOrgMap).sort((a, b) => a.localeCompare(b, 'es'));
      registrarAutocompletado('dependencia', depList, dep => {
        actualizarOrganismo(dep);
      });
      // Organismo: empieza vacío; se llena cuando se elige Dependencia
      registrarAutocompletado('organismo', [], null);

      // 3. Municipio → Localidad
      //    Localidad.csv = col1:"Municipio o demarcación territorial", col2:Localidad
      munLocMap = await cargarMapa(URLS_CSV.localidad);
      const munList = Object.keys(munLocMap).sort((a, b) => a.localeCompare(b, 'es'));
      registrarAutocompletado('municipio', munList, mun => {
        actualizarLocalidad(mun);
      });
      registrarAutocompletado('localidad', [], null);

      // 4. Restaurar bloqueos guardados
      CAMPOS.forEach(id => {
        if (localStorage.getItem(`bloqueado_${id}`) === 'true') {
          const chk = document.getElementById(getCheckId(id));
          if (chk) { chk.checked = true; alternarBloqueo(id); }
          const val = localStorage.getItem(id);
          if (val !== null) setValor(id, val);
          // Actualizar dependencias si había valor bloqueado
          if (id === 'dependencia') actualizarOrganismo(val);
          if (id === 'municipio') actualizarLocalidad(val);
        }
      });

      // 5. Fecha de hoy por defecto
      const fechaEl = document.getElementById('fecha');
      if (!fechaEl.value) fechaEl.value = new Date().toISOString().split('T')[0];

      renderizarTabla();
      document.getElementById('buscador').addEventListener('input', renderizarTabla);
    }

    // ─── FORMULARIO ───────────────────────────────────────────────────────────
    function getValor(id) {
      const el = document.getElementById(id); return el ? el.value : '';
    }
    function setValor(id, val) {
      const el = document.getElementById(id); if (el) el.value = val;
    }

    function alternarBloqueo(id) {
      const el = document.getElementById(id);
      const chk = document.getElementById(getCheckId(id));
      if (!el || !chk) return;
      const esSelect = el.tagName === 'SELECT';
      el.readOnly = !esSelect && chk.checked;
      el.disabled = esSelect && chk.checked;
      el.classList.toggle('bloqueado', chk.checked);
      localStorage.setItem(`bloqueado_${id}`, chk.checked);
      if (chk.checked) localStorage.setItem(id, el.value);
      else localStorage.removeItem(id);
    }

    function ajustarAlturaCampo(id) {
      const el = document.getElementById(id);
      if (el) { el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px'; }
    }

    function resetEdicion() {
      filaEnEdicion = null;
      document.getElementById('btnGuardar').innerHTML = '<i class="fa-solid fa-floppy-disk"></i> Guardar (Ctrl+Q)';
      document.getElementById('btnEliminar').style.display = 'none';
    }

    function limpiarNoBloqueados() {
      CAMPOS.forEach(id => {
        const chk = document.getElementById(getCheckId(id));
        if (!chk || !chk.checked) { if (id !== 'fecha') setValor(id, ''); }
      });
      ['titular', 'notas'].forEach(ajustarAlturaCampo);
    }

    function limpiarFormulario() {
      CAMPOS.forEach(id => {
        const chk = document.getElementById(getCheckId(id));
        if (chk) { chk.checked = false; alternarBloqueo(id); }
        setValor(id, '');
      });
      resetEdicion();
      ['titular', 'notas'].forEach(ajustarAlturaCampo);
    }

    // ─── GUARDAR ──────────────────────────────────────────────────────────────
    document.getElementById('notaForm').onsubmit = e => {
      e.preventDefault();
      const data = {};
      CAMPOS.forEach(id => data[id] = getValor(id));
      if (filaEnEdicion !== null) {
        notas[filaEnEdicion] = data; resetEdicion();
      } else {
        notas.push(data);
      }
      localStorage.setItem('superbol_notas', JSON.stringify(notas));
      limpiarNoBloqueados();
      renderizarTabla();
      document.getElementById('titular').focus();
    };

    // Al presionar Enter en Enlace, no guardar, solo avanzar
    document.getElementById('enlace').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        moverFoco(this);
      }
    });

    // ─── TABLA ────────────────────────────────────────────────────────────────
    function renderizarTabla() {
      const body = document.querySelector('#tablaNotas tbody');
      const filtro = document.getElementById('buscador').value.toLowerCase();
      body.innerHTML = '';

      let data = [...notas];
      if (filtro) data = data.filter(n => Object.values(n).some(v => (v || '').toLowerCase().includes(filtro)));

      data.sort((a, b) => {
        const vA = (a[ordenActual.col] || '').toString();
        const vB = (b[ordenActual.col] || '').toString();
        const r = vA.localeCompare(vB, 'es', { sensitivity: 'base' });
        return ordenActual.dir === 'asc' ? r : -r;
      });

      data.forEach(n => {
        const idx = notas.indexOf(n);
        const tr = document.createElement('tr');
        if (idx === filaEnEdicion) tr.classList.add('editando');
        if (CAMPOS_OBLIGATORIOS.some(c => !(n[c] || '').trim())) tr.classList.add('alerta-vacio');

        tr.innerHTML = CAMPOS.map(id => `<td title="${n[id] || ''}">${n[id] || ''}</td>`).join('') + `
          <td>
            <div class="acciones-btn-group">
              <button class="btn-icon-accion" onclick="editarNota(${idx})" title="Editar"><i class="fa-solid fa-pen"></i></button>
              <button class="btn-icon-accion borrar" onclick="borrarNota(${idx})" title="Eliminar"><i class="fa-solid fa-trash"></i></button>
            </div>
          </td>`;
        body.appendChild(tr);
      });

      document.getElementById('recordCount').textContent = `${notas.length} registros capturados`;
    }

    function editarNota(idx) {
      filaEnEdicion = idx;
      const n = notas[idx];
      CAMPOS.forEach(id => setValor(id, n[id] || ''));
      document.getElementById('btnGuardar').innerHTML = '<i class="fa-solid fa-floppy-disk"></i> Actualizar Nota';
      document.getElementById('btnEliminar').style.display = 'inline-block';
      if (n.dependencia) actualizarOrganismo(n.dependencia);
      if (n.municipio) actualizarLocalidad(n.municipio);
      ['titular', 'notas'].forEach(ajustarAlturaCampo);
      renderizarTabla();
      window.scrollTo(0, 0);
    }

    function borrarNota(idx = null) {
      const i = idx !== null ? idx : filaEnEdicion;
      if (i !== null && confirm('¿Eliminar esta nota?')) {
        notas.splice(i, 1);
        localStorage.setItem('superbol_notas', JSON.stringify(notas));
        limpiarFormulario(); renderizarTabla();
      }
    }

    function borrarTodo() {
      if (confirm('¿BORRAR ABSOLUTAMENTE TODO el historial local?')) {
        notas = [];
        localStorage.removeItem('superbol_notas');
        limpiarFormulario(); renderizarTabla();
      }
    }

    // ─── UI ───────────────────────────────────────────────────────────────────
    function ajustarZoom(delta, reset = false) {
      if (reset) zoomLevel = 1.0; else zoomLevel += delta;
      document.documentElement.style.setProperty('--table-zoom', zoomLevel);
      document.getElementById('zoomVal').textContent = Math.round(zoomLevel * 100) + '%';
    }

    function ordenar(col) {
      if (ordenActual.col === col) ordenActual.dir = ordenActual.dir === 'asc' ? 'desc' : 'asc';
      else { ordenActual.col = col; ordenActual.dir = 'asc'; }
      renderizarTabla();
    }

    function toggleDarkMode() {
      document.body.classList.toggle('dark-mode');
      document.getElementById('themeIcon').className =
        document.body.classList.contains('dark-mode') ? 'fas fa-sun' : 'fas fa-moon';
    }

    // Cerrar sugerencias clicking fuera
    document.addEventListener('mousedown', e => {
      if (!e.target.closest('.campo')) cerrarSugerencias();
    });

    // ─── ATAJOS ───────────────────────────────────────────────────────────────
    document.addEventListener('keydown', e => {
      if (e.ctrlKey && e.key === 'q') {
        e.preventDefault();
        document.getElementById('notaForm').requestSubmit();
      }
      if (e.ctrlKey && e.shiftKey && e.key === 'L') {
        e.preventDefault();
        const active = document.activeElement;
        if (active && CAMPOS.includes(active.id)) {
          const chk = document.getElementById(getCheckId(active.id));
          if (chk) { chk.checked = !chk.checked; alternarBloqueo(active.id); }
        }
      }
    });

    // ─── NO APLICA ────────────────────────────────────────────────────────────
    function noAplica() {
      ['reporta', 'fotografia', 'audiovisual', 'redes', 'logistica'].forEach(id => {
        setValor(id, 'N/A');
      });
    }

    // ─── EXPORTAR ─────────────────────────────────────────────────────────────
    async function exportarNotas() {
      if (!notas.length) { alert('No hay notas para exportar.'); return; }

      const usuarioVal = getValor('usuario').trim();
      if (!usuarioVal) {
        alert('Por favor, ingresa el nombre de Usuario antes de exportar.');
        document.getElementById('usuario').focus();
        return;
      }

      const btn = document.getElementById('btnExportar');
      const original = btn ? btn.innerHTML : '';
      if (btn) { btn.disabled = true; btn.textContent = 'Enviando...'; }

      try {
        const payload = notas.map(n => ({
          "Usuario": n.usuario,
          "Género": n.genero,
          "ID": n.id_consecutivo,
          "Fecha": n.fecha,
          "Titular": n.titular,
          "Dependencia": n.dependencia,
          "Organismo": n.organismo,
          "Municipio / Región": n.municipio,
          "Localidad": n.localidad,
          "Tipo": n.tipo,
          "Emite": n.emite,
          "Tema": n.tema,
          "Enlace": n.enlace,
          "Revisión editorial": n.revision,
          "Foto/imágenes": n.foto_imagenes,
          "Video": n.video,
          "Audio": n.audio,
          "Reporta": n.reporta,
          "Fotografía": n.fotografia,
          "Audiovisual": n.audiovisual,
          "Redes": n.redes,
          "Logística": n.logistica
        }));
        // Enviar a Google Sheets
        const p = new URLSearchParams();
        p.append('data', JSON.stringify(payload));
        await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: p });

        // Descargar copia CSV
        const encabezados = Object.keys(payload[0]);
        const filasCsv = payload.map(row =>
          encabezados.map(h => `"${(row[h] || '').replace(/"/g, '""')}"`).join(',')
        );
        const csvContent = '\uFEFF' + [encabezados.join(','), ...filasCsv].join('\r\n');
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        const fecha = new Date().toISOString().slice(0, 10);
        link.href = URL.createObjectURL(blob);
        link.download = `${usuarioVal}_${fecha}.csv`;
        link.click();

        alert('Datos enviados a Google Sheets y descargados como CSV.');
      } catch (err) {
        alert('Error al exportar: ' + err.message);
      } finally {
        if (btn) { btn.disabled = false; btn.innerHTML = original; }
      }
    }

    // ─── ARRANCAR ─────────────────────────────────────────────────────────────
    init();
  </script>
</body>

</html>
